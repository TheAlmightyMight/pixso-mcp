<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 12px;
        margin: 0;
        background-color: #ffffff;
      }
      .status {
        font-size: 12px;
        padding: 8px;
        border-radius: 4px;
        margin-bottom: 12px;
      }
      .status.connected {
        background-color: #e6f7ef;
        color: #1a7f37;
      }
      .status.disconnected {
        background-color: #fff1f0;
        color: #cf1322;
      }
      h3 {
        margin: 0 0 8px 0;
        font-size: 14px;
        color: #333;
      }
      p {
        font-size: 12px;
        color: #666;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <h3>Pixso MCP Connector</h3>
    <div id="status" class="status disconnected">🔌 Отключено от сервера</div>
    <p>Плагин работает как мост между Pixso и MCP-сервером. !!!</p>

    <script>
      const statusEl = document.getElementById("status");
      let socket = null;
      let pendingRequestIds = new Map();

      function connect() {
        // Подключаемся к локальному WebSocket серверу (порт 3667 по умолчанию)
        socket = new WebSocket("ws://localhost:3667");

        socket.onopen = () => {
          statusEl.innerText = "✅ Подключено к MCP-серверу";
          statusEl.className = "status connected";
        };

        socket.onclose = () => {
          statusEl.innerText = "🔌 Отключено. Переподключение через 5с...";
          statusEl.className = "status disconnected";
          setTimeout(connect, 5000);
        };

        socket.onerror = (err) => {
          console.error("Ошибка WebSocket:", err);
          socket.close();
        };

        // Сообщения от MCP-сервера
        socket.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.type === "request") {
              // Пересылаем запрос в main.js (основной поток плагина)
              parent.postMessage(
                {
                  pluginMessage: {
                    type: "mcp-request",
                    id: data.id,
                    command: data.command,
                    params: data.params,
                  },
                },
                "*",
              );
            }
          } catch (err) {
            console.error("Ошибка при обработке сообщения от сервера:", err);
          }
        };
      }

      // Сообщения от main.js (основной поток плагина)
      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (message && message.type === "mcp-response") {
          // Отправляем результат обратно на MCP-сервер по WebSocket
          if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(
              JSON.stringify({
                id: message.id,
                type: "response",
                payload: message.payload,
              }),
            );
          }
        }
      };

      // Запуск подключения
      connect();
    </script>
  </body>
</html>
